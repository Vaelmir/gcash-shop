<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RevolveSMP Shop</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
      text-align: center;
    }

    .tab-buttons {
      margin-bottom: 20px;
    }

    .tab-buttons button {
      background: #333;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-buttons button.active {
      background: #ff5722;
    }

    .tab {
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    .tab.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shop-item {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
      max-width: 400px;
      margin: auto;
    }

    img.qr {
      width: 200px;
      margin: 15px 0;
      border-radius: 6px;
    }

    input, select, button, label {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    button[type="submit"], .submit-btn {
      background: #ff5722;
      color: #fff;
      font-weight: bold;
    }

    button[type="submit"]:hover {
      background: #e64a19;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>🛒 RevolveSMP Shop</h1>
  <p>Choose a payment method:</p>

  <div class="tab-buttons">
    <button class="tab-btn active" onclick="showTab('gcashTab')">🇵🇭 GCash</button>
    <button class="tab-btn" onclick="showTab('paypalTab')">🌐 PayPal</button>
  </div>

  <!-- GCash Tab -->
  <div class="tab active" id="gcashTab">
    <div class="shop-item">
      <h2>🛍️ GCash Payment</h2>
      <img class="qr" src="gcash_qr.png" alt="GCash QR Code" />
      <form id="paymentForm">
        <select id="item" required>
          <option value="" disabled selected>Select item</option>
          <option value="Premium Rank – ₱200">⭐ Premium Rank – ₱200</option>
          <option value="Shady Crate – ₱20">🧊 Shady Crate – ₱20</option>
          <option value="Destiny Crate – ₱20">🎯 Destiny Crate – ₱20</option>
          <option value="Radiant Crate – ₱30">🌟 Radiant Crate – ₱30</option>
          <option value="Abyss Crate – ₱30">💀 Abyss Crate – ₱30</option>
        </select>
        <input type="text" id="ign" placeholder="Minecraft Username" required />
        <input type="text" id="gcash" placeholder="GCash Number Used" required />
        <p><strong>Reference ID:</strong> <span id="refID"></span>
        <button type="button" id="copyRef">Copy Ref ID</button></p>
        <button type="submit" class="submit-btn">Submit Payment Info</button>
      </form>
      <p id="statusMsg"></p>
    </div>
  </div>

  <!-- PayPal Tab -->
  <div class="tab" id="paypalTab">
    <div class="shop-item">
      <h2>🌐 Pay with PayPal</h2>

      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick" />
        <input type="hidden" name="business" value="asoniojohnpaul@gmail.com" />
        <input type="hidden" name="item_name" value="Premium Rank – 30 Days" />
        <input type="hidden" name="amount" value="3.50" />
        <input type="hidden" name="currency_code" value="USD" />
        <label>⭐ Premium Rank – $3.50
          <input type="text" name="custom" placeholder="Minecraft IGN" required />
        </label>
        <button type="submit">Buy</button>
      </form>

      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick" />
        <input type="hidden" name="business" value="asoniojohnpaul@gmail.com" />
        <input type="hidden" name="item_name" value="Shady Crate Key" />
        <input type="hidden" name="amount" value="0.35" />
        <input type="hidden" name="currency_code" value="USD" />
        <label>🧊 Shady Crate – $0.35
          <input type="text" name="custom" placeholder="Minecraft IGN" required />
        </label>
        <button type="submit">Buy</button>
      </form>

      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick" />
        <input type="hidden" name="business" value="asoniojohnpaul@gmail.com" />
        <input type="hidden" name="item_name" value="Destiny Crate Key" />
        <input type="hidden" name="amount" value="0.35" />
        <input type="hidden" name="currency_code" value="USD" />
        <label>🎯 Destiny Crate – $0.35
          <input type="text" name="custom" placeholder="Minecraft IGN" required />
        </label>
        <button type="submit">Buy</button>
      </form>

      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick" />
        <input type="hidden" name="business" value="asoniojohnpaul@gmail.com" />
        <input type="hidden" name="item_name" value="Radiant Crate Key" />
        <input type="hidden" name="amount" value="0.50" />
        <input type="hidden" name="currency_code" value="USD" />
        <label>🌟 Radiant Crate – $0.50
          <input type="text" name="custom" placeholder="Minecraft IGN" required />
        </label>
        <button type="submit">Buy</button>
      </form>

      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick" />
        <input type="hidden" name="business" value="asoniojohnpaul@gmail.com" />
        <input type="hidden" name="item_name" value="Abyss Crate Key" />
        <input type="hidden" name="amount" value="0.50" />
        <input type="hidden" name="currency_code" value="USD" />
        <label>💀 Abyss Crate – $0.50
          <input type="text" name="custom" placeholder="Minecraft IGN" required />
        </label>
        <button type="submit">Buy</button>
      </form>
    </div>
  </div>

  <footer>
    ⏳ After paying, DM proof and Ref ID to <strong>AngKool</strong> on Discord.  
    Server: <strong>RevolveSMP</strong>
  </footer>

  <script>
    // Tab toggle logic
    function showTab(id) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
    }

    // UUID generator
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    const refID = generateUUID();
    document.getElementById("refID").innerText = refID;
    document.getElementById("copyRef").onclick = () => {
      navigator.clipboard.writeText(refID);
      const btn = document.getElementById("copyRef");
      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = "Copy Ref ID", 1500);
    };

    document.getElementById("paymentForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const item = document.getElementById("item").value;
      const ign = document.getElementById("ign").value;
      const gcash = document.getElementById("gcash").value;
      const msg = [
        "<@1354819465237369069>",
        "**[RevolveSMP GCash Payment Submitted]**",
        "**Item:** " + item,
        "**IGN:** " + ign,
        "**GCash No:** " + gcash,
        "**Ref ID:** " + refID
      ].join("\n");

      const payload = { content: msg };
      const statusMsg = document.getElementById("statusMsg");
      statusMsg.innerText = "Submitting...";

      try {
        await fetch("https://discord.com/api/webhooks/1392118947096297513/HmnA_H1hVWmAPTCw9dVXSQTleevR3Tu8Q4x89ZzFTw7CA6vfDBnAyD2QSwci_3XUdQJP", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        statusMsg.innerText = "✅ Submitted! DM proof to AngKool.";
        this.reset();
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "❌ Failed to submit.";
      }
    });
  </script>
</body>
</html>
