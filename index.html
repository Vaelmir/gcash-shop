<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RevolveSMP GCash Shop</title>
  <style>
    body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
    .shop-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .shop-item { background: #1e1e1e; border: 2px solid #333; border-radius: 10px; padding: 20px; width: 300px; box-shadow: 0 0 10px #222; }
    img.qr { width: 200px; margin: 15px 0; border: 2px solid #444; border-radius: 6px; }
    input, select, button { padding: 10px; margin: 5px; width: 90%; border-radius: 5px; border: none; }
    button { background: #ff5722; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #e64a19; }
    footer { margin-top: 40px; color: #aaa; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>🛒 RevolveSMP GCash Shop</h1>
  <p>Select your item and submit proof:</p>
  <div class="shop-container">
    <div class="shop-item">
      <h2>🛍️ Submit Payment Info</h2>
      <img class="qr" src="gcash_qr.png" alt="GCash QR Code">
      <form id="paymentForm">
        <select id="item" required>
          <option value="" disabled selected>Select item</option>
          <option value="Premium Rank – ₱200">⭐ Premium Rank – ₱200</option>
          <option value="Shady Crate – ₱20">🧊 Shady Crate – ₱20</option>
          <option value="Destiny Crate – ₱20">🎯 Destiny Crate – ₱20</option>
          <option value="Radiant Crate – ₱30">🌟 Radiant Crate – ₱30</option>
          <option value="Abyss Crate – ₱30">💀 Abyss Crate – ₱30</option>
        </select>
        <input type="text" id="ign" placeholder="Minecraft Username" required>
        <input type="text" id="gcash" placeholder="GCash Number Used" required>
        <button type="submit">Submit Payment Info</button>
      </form>
      <p id="statusMsg"></p>
    </div>
  </div>
  <footer>
    ⏳ Items delivered manually. After paying, please DM your GCash proof and Minecraft name to <strong>Vaelmir</strong> on Discord.<br>
    Server: <strong>RevolveSMP</strong>
  </footer>
<script>
const form = document.getElementById('paymentForm');
const statusMsg = document.getElementById('statusMsg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const item = document.getElementById('item').value;
  const ign = document.getElementById('ign').value;
  const gcash = document.getElementById('gcash').value;

  const payload = {
    content: `**[RevolveSMP GCash Payment Submitted]**
**Item:** ${item}
**IGN:** ${ign}
**GCash No:** ${gcash}`
  };

  statusMsg.innerText = "Submitting to Discord...";

  try {
    await fetch("https://discord.com/api/webhooks/1392118947096297513/HmnA_H1hVWmAPTCw9dVXSQTleevR3Tu8Q4x89ZzFTw7CA6vfDBnAyD2QSwci_3XUdQJP", {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    statusMsg.innerText = "✅ Submitted! Don't forget to DM proof to Vaelmir on Discord.";
    form.reset();
  } catch (err) {
    console.error(err);
    statusMsg.innerText = "❌ Failed to submit. Try again or contact Vaelmir.";
  }
});
</script>
</body>
</html>
